name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        # --legacy-peer-deps is required because peerjs 1.4.7 has peer-dep
        # ranges that npm 7+ rejects without it.
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint -- --max-warnings 50

      - name: Run tests
        run: npm test -- --watchAll=false --ci

      - name: Build production bundle
        run: npm run build

      - name: Check bundle size budgets
        run: npm run check:bundle-budget
