name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # --ignore-scripts avoids the node-sass native build which is
        # incompatible with Node 20+.  The SCSS compilation step is
        # webpack-only and is not exercised during tests.
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test -- --watchAll=false --ci

      - name: Build production bundle
        run: npm run build
        env:
          CI: false
